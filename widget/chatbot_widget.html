<div id="cb-widget-container">
    <!-- Chat Button -->
    <div id="cb-button">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </div>

    <!-- Chat Window -->
    <div id="cb-window">
        <div id="cb-header">
            <span>Satış Asistanı</span>
            <button id="cb-close" style="background:none; border:none; color:white; cursor:pointer; font-size:20px;">×</button>
        </div>
        <div id="cb-messages">
            <div class="cb-msg cb-msg-bot">Merhaba! Size nasıl yardımcı olabilirim?</div>
        </div>
        <div id="cb-input-area">
            <input type="text" id="cb-input" placeholder="Mesajınızı yazın...">
            <button id="cb-send">Gönder</button>
        </div>
    </div>
</div>
